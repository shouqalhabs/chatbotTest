<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحوكمة الذكية - جامعة القصيم</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f4f6f8;display:flex;justify-content:center;align-items:center;min-height:100vh}
#chat-wrap{display:flex;flex-direction:column;width:100%;max-width:100%;height:95vh;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
#chat-header{background:#1a7344;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hav{width:34px;height:34px;background:#fff;color:#1a7344;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
#chat-header span{font-size:16px;font-weight:600}
#messages{flex:1;overflow-y:auto;background:#fff}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px}
.messages-inner{max-width:780px;width:100%;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px}
.msg{display:flex;flex-direction:column;width:100%}
.msg.user{align-items:flex-end}
.msg.user .msg-body{background:#1a7344;color:#fff;padding:11px 16px;border-radius:18px 18px 4px 18px;font-size:15px;line-height:1.6;max-width:70%;display:inline-block;direction:rtl;text-align:right;margin-left:auto;margin-right:0;unicode-bidi:plaintext}
.msg.bot{align-items:flex-start}
.msg.bot .msg-body{font-size:15px;line-height:1.8;color:#1a1a1a;width:100%}
.msg.bot .msg-body.rtl{direction:rtl;text-align:right}
.msg.bot .msg-body.ltr{direction:ltr;text-align:left}
.msg.bot .msg-body p{margin-bottom:8px}
.msg.bot .msg-body p:last-child{margin-bottom:0}
.msg.bot .msg-body ul,.msg.bot .msg-body ol{margin:3px 0 6px}
.msg.bot .msg-body.rtl ul,.msg.bot .msg-body.rtl ol{padding-right:20px}
.msg.bot .msg-body.ltr ul,.msg.bot .msg-body.ltr ol{padding-left:20px}
.msg.bot .msg-body ol{list-style:decimal}
.msg.bot .msg-body li{margin-bottom:3px;line-height:1.7}
.msg.bot .msg-body li>ul,.msg.bot .msg-body li>ol{margin:3px 0 2px}
.msg.bot .msg-body.rtl li>ul,.msg.bot .msg-body.rtl li>ol{padding-right:18px}
.msg.bot .msg-body.ltr li>ul,.msg.bot .msg-body.ltr li>ol{padding-left:18px}
.msg.bot .msg-body li>ul{list-style:circle}
.msg.bot .msg-body li>ul li>ul{list-style:square}
.msg.bot .msg-body strong{font-weight:600}
.msg.bot .msg-body h1,.msg.bot .msg-body h2,.msg.bot .msg-body h3{font-weight:600;margin:12px 0 6px}
.msg.bot .msg-body a{color:#1a7344;text-decoration:underline;word-break:break-all}
.msg.bot .msg-body a:hover{color:#0e4d2e}
.msg.bot .msg-body hr{border:none;border-top:1px solid #ddd;margin:12px 0}
#qr-outer{display:none;background:#fff;flex-shrink:0}
#qr-outer.visible{display:block}
#quick-replies-bar{max-width:780px;width:100%;margin:0 auto;padding:8px 20px 4px;display:flex;flex-wrap:wrap;gap:8px;direction:rtl}
.qr-btn{background:#fff;border:1.5px solid #1a7344;color:#1a7344;padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s,color .15s;line-height:1.4}
.qr-btn:hover{background:#1a7344;color:#fff}
.typing{display:flex;gap:5px;align-items:center;padding:6px 0}
.typing span{width:8px;height:8px;background:#1a7344;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ===== تصميم مربع الكتابة مع زر الإرسال في الجهة اليمنى ===== */
#input-area{
    flex-shrink: 0;
    background: #fff;
    padding: 0 20px 14px 20px;
}
.input-inner{
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    background: #eef2f5;    /* لون أغمق قليلاً من الأبيض */
    border-radius: 32px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 6px 16px 6px 8px;   /* padding يمين أكبر قليلاً (لأن الزر الآن على اليمين) */
    transition: all 0.2s ease;
    border: none;
    /* الترتيب: الزر أولاً (على اليمين) ثم حقل النص */
    direction: rtl;
}
.input-inner:focus-within{
    background: #e8edf1;
    box-shadow: 0 0 0 2px rgba(26,115,68,0.15);
}
/* زر الإرسال - يظهر في أقصى اليمين (لأنه أول عنصر في الترتيب RTL) */
#send-btn{
    width: 40px;
    height: 40px;
    background: #1a7344;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 2px;
    order: 0; /* أول عنصر */
}
#send-btn:hover:not(:disabled){
    opacity: 0.85;
    transform: scale(1.02);
}
#send-btn:active:not(:disabled){
    transform: scale(0.96);
}
#send-btn:disabled{
    opacity: 0.4;
    cursor: not-allowed;
}
#send-btn svg{
    width: 18px;
    height: 18px;
    fill: #fff;
    margin-right: 2px;
}
/* حقل النص - يأتي بعد الزر مباشرة (على يسار الزر في الترتيب RTL) */
#msg-input{
    flex: 1;
    border: none;
    background: transparent;
    font-size: 15px;
    font-family: inherit;
    padding: 10px 0;
    resize: none;
    max-height: 100px;
    outline: none;
    color: #1a1a1a;
    line-height: 1.45;
    order: 1;
}
#msg-input:disabled{
    opacity: 0.6;
    cursor: not-allowed;
}
#msg-input::placeholder{
    color: #9aaeb9;
}
/* ===== نهاية تعديل مربع الكتابة ===== */

.disclaimer{
    font-size: 11px;
    text-align: center;
    padding: 10px 15px 14px 15px;
    color: #888;
    background: #fff;
    flex-shrink: 0;
    line-height: 1.4;
    border-top: none;
}
</style>
</head>
<body>
<div id="chat-wrap" dir="rtl">
  <div id="chat-header">
    <div class="hav">QU</div>
    <span>الحوكمة الذكية - جامعة القصيم</span>
  </div>
  <div id="messages">
    <div class="messages-inner" id="messages-inner"></div>
  </div>
  <div id="qr-outer">
    <div id="quick-replies-bar"></div>
  </div>
  <div id="input-area">
    <div class="input-inner">
      <button id="send-btn" aria-label="إرسال" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 20l19-8L3 4v5l13 3-13 3z"/></svg>
      </button>
      <textarea id="msg-input" rows="1" placeholder="جارٍ الاتصال..." disabled></textarea>
    </div>
  </div>
  <div class="disclaimer">هذه الخدمة أداة استرشادية تعمل بالذكاء الاصطناعي للمساعدة فقط.</div>
</div>

<script>
(function(){
"use strict";

const TOKEN_ENDPOINT="https://8f25ee591c52e1a8afb9345860cf3a.4a.environment.api.powerplatform.com/powervirtualagents/botsbyschema/crf19_agent/directline/token?api-version=2022-03-01-preview";

const messagesEl=document.getElementById("messages");
const messagesInner=document.getElementById("messages-inner");
const qrOuter=document.getElementById("qr-outer");
const qrBar=document.getElementById("quick-replies-bar");
const input=document.getElementById("msg-input");
const sendBtn=document.getElementById("send-btn");

let dlUrl=null,token=null,conversationId=null,watermark=null,waiting=false;
const seenActivityIds=new Set();

function updateInputDirection(){
  const first=input.value.trimStart().charAt(0);
  const isAr=/[\u0600-\u06FF]/.test(first);
  input.style.direction=(!first||isAr)?"rtl":"ltr";
  input.style.textAlign=(!first||isAr)?"right":"left";
}
input.addEventListener("input",updateInputDirection);
input.addEventListener("focus",updateInputDirection);

function autoResize(){
  input.style.height="auto";
  input.style.height=Math.min(input.scrollHeight,100)+"px";
}
input.addEventListener("input",autoResize);

function isRTL(text){
  const rtl=(text.match(/[\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF]/g)||[]).length;
  const ltr=(text.match(/[a-zA-Z]/g)||[]).length;
  return rtl>=ltr;
}

/* ══════════════════════════════════════
   Markdown renderer
══════════════════════════════════════ */
function renderMarkdown(raw){
  const LINK_MD=/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;
  const LINK_URL=/https?:\/\/[^\s<>"')\]،,،]+/g;
  const segments=[];
  let last=0;
  const combined=[];
  let m;
  LINK_MD.lastIndex=0;
  while((m=LINK_MD.exec(raw))!==null) combined.push({idx:m.index,len:m[0].length,type:'md',label:m[1],url:m[2]});
  LINK_URL.lastIndex=0;
  while((m=LINK_URL.exec(raw))!==null){
    const inside=combined.some(c=>c.type==='md'&&m.index>=c.idx&&m.index<c.idx+c.len);
    if(!inside) combined.push({idx:m.index,len:m[0].length,type:'url',url:m[0]});
  }
  combined.sort((a,b)=>a.idx-b.idx);
  for(const c of combined){
    if(c.idx>last) segments.push({type:'text',value:raw.slice(last,c.idx)});
    const href=c.url.replace(/[.,،؟?!:;'")\]]+$/,'');
    const label=c.type==='md'?escHtml(c.label):escHtml(href);
    segments.push({type:'html',value:`<a href="${escAttr(href)}" target="_blank" rel="noopener noreferrer">${label}</a>`});
    last=c.idx+c.len;
  }
  if(last<raw.length) segments.push({type:'text',value:raw.slice(last)});
  const processed=segments.map(s=>{
    if(s.type==='html') return s.value;
    return applyMarkdown(escHtml(s.value));
  }).join('');
  return wrapParagraphs(processed);
}

function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escAttr(s){return s.replace(/"/g,"&quot;");}

function applyMarkdown(s){
  let t=s
    .replace(/^---$/gm,"<hr>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/^###\s(.+)/gm,"<h3>$1</h3>")
    .replace(/^##\s(.+)/gm,"<h2>$1</h2>")
    .replace(/^#\s(.+)/gm,"<h1>$1</h1>")
    .replace(/^(\d+)\.\s(.+)/gm,"<oli>$2</oli>")
    .replace(/(<oli>[\s\S]*?<\/oli>(?:\s*<oli>[\s\S]*?<\/oli>)*)/g,(m)=>
      "<ol>"+m.replace(/<oli>/g,"<li>").replace(/<\/oli>/g,"</li>")+"</ol>");
  return buildNestedLists(t);
}

function buildNestedLists(text){
  const lines=text.split('\n');
  const out=[];
  let i=0;
  while(i<lines.length){
    if(isListLine(lines[i])){
      const rawItems=[];
      let j=i;
      while(j<lines.length){
        if(isListLine(lines[j])){
          rawItems.push(lines[j]);
          j++;
        } else if(lines[j].trim()===''){
          let peek=j+1;
          while(peek<lines.length&&lines[peek].trim()==='') peek++;
          if(peek<lines.length&&isListLine(lines[peek])){
            j=peek;
          } else break;
        } else break;
      }
      const items=rawItems.map(l=>{
        const m=l.match(/^(\s*)[-*•]\s+(.*)/);
        return m?{ind:m[1].length,txt:m[2]}:null;
      }).filter(Boolean);
      if(out.length>0) out.push('');
      out.push(buildLevel(items,0,0)[0]);
      out.push('');
      i=j;
    } else {
      out.push(lines[i]);
      i++;
    }
  }
  return out.join('\n');
}

function isListLine(line){
  return /^\s*[-*•]\s/.test(line);
}

function buildLevel(items,start,base){
  let html='<ul>';
  let i=start;
  while(i<items.length){
    const it=items[i];
    if(it.ind<base) break;
    if(it.ind>base){i++;continue;}
    html+='<li>'+it.txt;
    if(i+1<items.length&&items[i+1].ind>it.ind){
      const[nested,ni]=buildLevel(items,i+1,items[i+1].ind);
      html+=nested;
      i=ni;
    } else {
      i++;
    }
    html+='</li>';
  }
  return[html+'</ul>',i];
}

function wrapParagraphs(html){
  return html.split(/\n\n+/).map(block=>{
    const t=block.trim();
    if(!t) return"";
    if(/^<[huol]/.test(t)) return t;
    return"<p>"+t.replace(/\n/g,"<br>")+"</p>";
  }).filter(Boolean).join("");
}

/* ══════════════════════════════════════
   Quick Replies
══════════════════════════════════════ */
function setQuickReplies(actions){
  qrBar.innerHTML="";
  if(!actions||!actions.length){qrOuter.classList.remove("visible");return;}
  actions.forEach(action=>{
    const btn=document.createElement("button");
    btn.className="qr-btn";
    btn.textContent=action.title||action.value;
    btn.addEventListener("click",()=>{clearQuickReplies();sendText(action.value||action.title);});
    qrBar.appendChild(btn);
  });
  qrOuter.classList.add("visible");
  messagesEl.scrollTop=messagesEl.scrollHeight;
}
function clearQuickReplies(){qrBar.innerHTML="";qrOuter.classList.remove("visible");}

/* ══════════════════════════════════════
   Messages
══════════════════════════════════════ */
function addMessage(role,text,suggestedActions){
  const div=document.createElement("div");
  div.className="msg "+role;
  if(role==="bot"){
    const dir=isRTL(text)?"rtl":"ltr";
    div.innerHTML=`<div class="msg-body ${dir}">${renderMarkdown(text)}</div>`;
    messagesInner.appendChild(div);
    if(suggestedActions&&suggestedActions.actions&&suggestedActions.actions.length)
      setQuickReplies(suggestedActions.actions);
    else clearQuickReplies();
  } else {
    div.innerHTML=`<div class="msg-body">${escHtml(text)}</div>`;
    messagesInner.appendChild(div);
  }
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

function showTyping(){
  const div=document.createElement("div");
  div.className="msg bot";div.id="typing-indicator";
  div.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
  messagesInner.appendChild(div);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}
function hideTyping(){const t=document.getElementById("typing-indicator");if(t)t.remove();}

function setReady(ready){
  input.disabled=!ready;
  sendBtn.disabled=!ready;
  input.placeholder=ready?"اكتب رسالتك هنا...":"جارٍ الاتصال...";
}

/* ══════════════════════════════════════
   Direct Line
══════════════════════════════════════ */
async function pollActivities(){
  if(!dlUrl||!conversationId||!token)return;
  try{
    const url=`${dlUrl}v3/directline/conversations/${conversationId}/activities${watermark?"?watermark="+watermark:""}`;
    const res=await fetch(url,{headers:{"Authorization":"Bearer "+token}});
    if(!res.ok)return;
    const data=await res.json();
    if(data.activities&&data.activities.length){
      data.activities.forEach(act=>{
        if(act.id&&seenActivityIds.has(act.id))return;
        if(act.id)seenActivityIds.add(act.id);
        if(act.type==="message"&&act.from&&act.from.role==="bot"){
          const text=act.text||"";
          if(text){hideTyping();addMessage("bot",text,act.suggestedActions);waiting=false;}
        }
      });
      watermark=data.watermark;
    }
  }catch(e){}
}

async function postActivity(activity){
  await fetch(`${dlUrl}v3/directline/conversations/${conversationId}/activities`,{
    method:"POST",
    headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({...activity,from:{id:"user1",name:"User"},locale:"ar-SA"})
  });
}

async function sendText(text){
  if(!text||waiting)return;
  waiting=true;
  clearQuickReplies();
  addMessage("user",text);
  showTyping();
  await postActivity({type:"message",text});
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text)return;
  input.value="";
  autoResize();
  updateInputDirection();
  await sendText(text);
}

async function initChat(){
  try{
    const url=new URL(TOKEN_ENDPOINT);
    const apiVersion=url.searchParams.get("api-version");
    const envEndpoint=url.origin;
    const settingsRes=await fetch(`${envEndpoint}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`);
    const settings=await settingsRes.json();
    dlUrl=settings.channelUrlsById.directline;
    const convRes=await fetch(TOKEN_ENDPOINT);
    const convInfo=await convRes.json();
    token=convInfo.token;
    const startRes=await fetch(`${dlUrl}v3/directline/conversations`,{
      method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}
    });
    const startData=await startRes.json();
    conversationId=startData.conversationId;
    setInterval(pollActivities,1500);
    setReady(true);
    await postActivity({type:"event",name:"startConversation",channelData:{postBack:true}});
    showTyping();
  }catch(err){
    console.error("فشل الاتصال:",err);
    input.placeholder="فشل الاتصال — حاول تحديث الصفحة";
  }
}

sendBtn.addEventListener("click",sendMessage);
input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
initChat();
})();
</script>
</body>
</html>
