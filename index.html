<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحوكمة الذكية - جامعة القصيم</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f4f6f8;display:flex;justify-content:center;align-items:center;min-height:100vh}
#chat-wrap{display:flex;flex-direction:column;width:100%;max-width:100%;height:95vh;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
#chat-header{background:#1a7344;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hav{width:34px;height:34px;background:#fff;color:#1a7344;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
#chat-header span{font-size:16px;font-weight:600}
#messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;background:#fff}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-thumb{background:#ccc;border-radius:10px}
.msg{display:flex;flex-direction:column;width:100%}
.msg.user{align-items:flex-end}
.msg.user .msg-body{background:#1a7344;color:#fff;padding:11px 16px;border-radius:18px 18px 4px 18px;font-size:15px;line-height:1.6;max-width:70%;display:inline-block;direction:rtl;text-align:right;margin-left:auto;margin-right:0;unicode-bidi:plaintext}
.msg.bot{align-items:flex-start}
.msg.bot .msg-body{font-size:15px;line-height:1.8;color:#1a1a1a;width:100%}
.msg.bot .msg-body.rtl{direction:rtl;text-align:right}
.msg.bot .msg-body.ltr{direction:ltr;text-align:left}
.msg.bot .msg-body p{margin-bottom:10px}
.msg.bot .msg-body p:last-child{margin-bottom:0}
.msg.bot .msg-body ul,.msg.bot .msg-body ol{margin:8px 0}
.msg.bot .msg-body.rtl ul,.msg.bot .msg-body.rtl ol{padding-right:22px}
.msg.bot .msg-body.ltr ul,.msg.bot .msg-body.ltr ol{padding-left:22px}
.msg.bot .msg-body li{margin-bottom:6px;line-height:1.7}
.msg.bot .msg-body strong{font-weight:600}
.msg.bot .msg-body h1,.msg.bot .msg-body h2,.msg.bot .msg-body h3{font-weight:600;margin:12px 0 6px}
.msg.bot .msg-body a{color:#1a7344;text-decoration:underline;word-break:break-all}
.msg.bot .msg-body a:hover{color:#0e4d2e}
.cite-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;background:#e8f5ee;color:#1a7344;border:1px solid #1a7344;border-radius:10px;font-size:11px;font-weight:700;vertical-align:super;line-height:1;cursor:pointer;text-decoration:none!important;transition:background .15s,color .15s}
.cite-badge:hover{background:#1a7344;color:#fff}
.refs-section{margin-top:12px;border-top:1px solid #e5e5e5;padding-top:8px;direction:rtl}
.refs-toggle{background:none;border:none;cursor:pointer;color:#888;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:6px;padding:2px 0}
.refs-toggle:hover{color:#1a7344}
.refs-toggle .arrow{transition:transform .2s;display:inline-block}
.refs-toggle.open .arrow{transform:rotate(180deg)}
.refs-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ref-item{display:flex;align-items:center;gap:10px;background:#f8f8f8;border:1px solid #eee;border-radius:8px;padding:9px 12px;cursor:pointer;transition:border-color .15s,background .15s;text-align:right}
.ref-item:hover{border-color:#1a7344;background:#f0faf4}
.ref-num{min-width:24px;height:24px;background:#1a7344;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ref-title{font-size:13px;color:#1a7344;text-decoration:underline;flex:1}
#ref-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center}
#ref-modal-overlay.active{display:flex}
#ref-modal{background:#fff;border-radius:12px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;padding:24px;position:relative;direction:rtl}
#ref-modal h3{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:14px;padding-left:32px}
#ref-modal .ref-body{font-size:14px;line-height:1.8;color:#333}
#ref-modal .ref-body a{color:#1a7344;text-decoration:underline;word-break:break-all}
#ref-modal-close{position:absolute;top:14px;left:14px;background:none;border:1px solid #ddd;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#666}
#ref-modal-close:hover{background:#f0f0f0}
#quick-replies-bar{padding:8px 16px 0;display:flex;flex-wrap:wrap;gap:8px;direction:rtl;background:#fff;flex-shrink:0}
#quick-replies-bar:empty{display:none}
.qr-btn{background:#fff;border:1.5px solid #1a7344;color:#1a7344;padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s,color .15s;line-height:1.4}
.qr-btn:hover{background:#1a7344;color:#fff}
.typing{display:flex;gap:5px;align-items:center;padding:6px 0}
.typing span{width:8px;height:8px;background:#1a7344;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
#input-area{padding:10px 16px 14px;border-top:1px solid #eee;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;background:#fff}
#msg-input{flex:1;border:1px solid #ddd;border-radius:22px;padding:11px 18px;font-size:15px;resize:none;max-height:120px;outline:none;background:#f9f9f9;color:#1a1a1a;font-family:inherit;line-height:1.5;transition:border-color .2s}
#msg-input:focus{border-color:#1a7344;background:#fff}
#send-btn{width:42px;height:42px;background:#1a7344;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
#send-btn:hover{opacity:.85}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#send-btn svg{width:17px;height:17px;fill:#fff;margin-right:2px}
.disclaimer{font-size:11px;text-align:center;padding:8px 15px;color:#888;border-top:1px solid #eee;background:#fff;flex-shrink:0;line-height:1.4}
</style>
</head>
<body>
<div id="chat-wrap" dir="rtl">
  <div id="chat-header">
    <div class="hav">QU</div>
    <span>الحوكمة الذكية - جامعة القصيم</span>
  </div>
  <div id="messages"></div>
  <div id="quick-replies-bar"></div>
  <div id="input-area">
    <button id="send-btn" aria-label="إرسال" disabled>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 20l19-8L3 4v5l13 3-13 3z"/></svg>
    </button>
    <textarea id="msg-input" rows="1" placeholder="جارٍ الاتصال..." disabled></textarea>
  </div>
  <div class="disclaimer">هذه الخدمة أداة استرشادية تعمل بالذكاء الاصطناعي للمساعدة فقط.</div>
</div>
<div id="ref-modal-overlay">
  <div id="ref-modal">
    <button id="ref-modal-close" aria-label="إغلاق">✕</button>
    <h3 id="ref-modal-title"></h3>
    <div class="ref-body" id="ref-modal-body"></div>
  </div>
</div>
<script>
(function(){
"use strict";

const TOKEN_ENDPOINT = "https://8f25ee591c52e1a8afb9345860cf3a.4a.environment.api.powerplatform.com/powervirtualagents/botsbyschema/crf19_agent/directline/token?api-version=2022-03-01-preview";

const messagesEl = document.getElementById("messages");
const qrBar     = document.getElementById("quick-replies-bar");
const input     = document.getElementById("msg-input");
const sendBtn   = document.getElementById("send-btn");

let dlUrl = null, token = null, conversationId = null, watermark = null, waiting = false;
const seenActivityIds = new Set();

/* ── اتجاه حقل الإدخال ── */
function updateInputDirection(){
  const first = input.value.trimStart().charAt(0);
  const isAr = /[\u0600-\u06FF]/.test(first);
  input.style.direction  = (!first || isAr) ? "rtl" : "ltr";
  input.style.textAlign  = (!first || isAr) ? "right" : "left";
}
input.addEventListener("input", updateInputDirection);
input.addEventListener("focus", updateInputDirection);

/* ── تغيير حجم حقل الإدخال ── */
function autoResize(){
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
}
input.addEventListener("input", autoResize);

/* ── كشف اتجاه النص ── */
function isRTL(text){
  const rtl = (text.match(/[\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF]/g)||[]).length;
  const ltr = (text.match(/[a-zA-Z]/g)||[]).length;
  return rtl >= ltr;
}

/* ── تحويل النص إلى HTML آمن مع دعم Markdown والروابط والمراجع ── */
function renderMarkdown(raw){
  // 0. استخرج تعريفات المراجع: [1]: "cite:x" "Title"  أو  [1]: https://...
  const refs = {};
  const REF_DEF = /^\[(\d+)\]:\s*(?:"[^"]*"\s*)?(?:"([^"]+)"|(https?:\/\/\S+)).*$/gm;
  let rm;
  while((rm = REF_DEF.exec(raw)) !== null){
    refs[rm[1]] = { title: rm[2]||null, url: rm[3]||null };
  }
  // احذف سطور تعريفات المراجع
  raw = raw.replace(/^\[\d+\]:.*$/gm,'').replace(/\n{3,}/g,'\n\n').trim();

  // 1. قسّم النص إلى أجزاء: روابط markdown [text](url)، روابط عادية، نص عادي
  const LINK_MD  = /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g;
  const LINK_URL = /https?:\/\/[^\s<>"')\]،,،]+/g;

  // نجمع كل المقاطع في مصفوفة: {type:'html'|'text', value}
  const segments = [];
  let last = 0;

  // دمج كلا النمطين بترتيب الظهور
  const combined = [];
  let m;
  LINK_MD.lastIndex = 0;
  while((m = LINK_MD.exec(raw)) !== null)  combined.push({idx:m.index, len:m[0].length, type:'md',  label:m[1], url:m[2]});
  LINK_URL.lastIndex = 0;
  while((m = LINK_URL.exec(raw)) !== null){
    // تأكد أنه ليس داخل رابط markdown معالَج
    const inside = combined.some(c => c.type==='md' && m.index >= c.idx && m.index < c.idx+c.len);
    if(!inside) combined.push({idx:m.index, len:m[0].length, type:'url', url:m[0]});
  }
  combined.sort((a,b)=>a.idx-b.idx);

  for(const c of combined){
    if(c.idx > last) segments.push({type:'text', value: raw.slice(last, c.idx)});
    const href = c.url.replace(/[.,،؟?!:;'")\]]+$/, ''); // أزل علامات الترقيم من النهاية
    const label = c.type==='md' ? escHtml(c.label) : escHtml(href);
    segments.push({type:'html', value:`<a href="${escAttr(href)}" target="_blank" rel="noopener noreferrer">${label}</a>`});
    last = c.idx + c.len;
  }
  if(last < raw.length) segments.push({type:'text', value: raw.slice(last)});

  // 2. طبّق Markdown على أجزاء النص فقط
  const processed = segments.map(s => {
    if(s.type === 'html') return s.value;
    return applyMarkdown(escHtml(s.value), refs);
  }).join('');

  // 3. لفّ الفقرات
  return wrapParagraphs(processed);
}

function escHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escAttr(s){
  return s.replace(/"/g,"&quot;");
}

function applyMarkdown(s, refs){
  if(refs && Object.keys(refs).length){
    s = s.replace(/\[(\d+)\]/g, (match, num) => {
      if(!refs[num]) return match;
      return `<span class="cite-badge" data-ref="${num}">${num}</span>`;
    });
  }
  return s
    .replace(/\*\*(.+?)\*\*/g,  "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,      "<em>$1</em>")
    .replace(/^###\s(.+)/gm,    "<h3>$1</h3>")
    .replace(/^##\s(.+)/gm,     "<h2>$1</h2>")
    .replace(/^#\s(.+)/gm,      "<h1>$1</h1>")
    .replace(/^[-*]\s(.+)/gm,   "<li>$1</li>")
    .replace(/(<li>[\s\S]*?<\/li>)/g, "<ul>$1</ul>")
    .replace(/<\/ul>\s*<ul>/g,  "");
}

function wrapParagraphs(html){
  return html.split(/\n\n+/).map(block => {
    const t = block.trim();
    if(!t) return "";
    if(/^<[huol]/.test(t)) return t;
    return "<p>" + t.replace(/\n/g,"<br>") + "</p>";
  }).filter(Boolean).join("");
}

/* ── Quick Replies ── */
function setQuickReplies(actions){
  qrBar.innerHTML = "";
  if(!actions || !actions.length) return;
  actions.forEach(action => {
    const btn = document.createElement("button");
    btn.className = "qr-btn";
    btn.textContent = action.title || action.value;
    btn.addEventListener("click", () => { clearQuickReplies(); sendText(action.value || action.title); });
    qrBar.appendChild(btn);
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function clearQuickReplies(){ qrBar.innerHTML = ""; }

/* ── Modal ── */
function openRefModal(refs, num){
  const ref = refs[num];
  if(!ref) return;
  const title = ref.title || `مرجع ${num}`;
  document.getElementById('ref-modal-title').textContent = title;
  const body = document.getElementById('ref-modal-body');
  if(ref.url){
    body.innerHTML = `<a href="${escAttr(ref.url)}" target="_blank" rel="noopener noreferrer">${escHtml(ref.url)}</a>`;
  } else {
    body.textContent = title;
  }
  document.getElementById('ref-modal-overlay').classList.add('active');
}
document.getElementById('ref-modal-close').addEventListener('click', () => {
  document.getElementById('ref-modal-overlay').classList.remove('active');
});
document.getElementById('ref-modal-overlay').addEventListener('click', e => {
  if(e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});

/* ── إضافة رسالة ── */
function addMessage(role, text, suggestedActions){
  const div = document.createElement("div");
  div.className = "msg " + role;
  if(role === "bot"){
    const dir = isRTL(text) ? "rtl" : "ltr";
    const { html, refs } = renderMarkdown(text);
    let inner = `<div class="msg-body ${dir}">${html}</div>`;

    // References section
    const refKeys = Object.keys(refs);
    if(refKeys.length){
      const items = refKeys.map(num => {
        const title = refs[num].title || (refs[num].url ? refs[num].url : `مرجع ${num}`);
        return `<div class="ref-item" data-ref="${num}"><span class="ref-num">${num}</span><span class="ref-title">${escHtml(title)}</span></div>`;
      }).join('');
      inner += `<div class="refs-section">
        <button class="refs-toggle" aria-expanded="false">
          <span class="arrow">▼</span>
          <span class="refs-label">مراجع ${refKeys.length}</span>
        </button>
        <div class="refs-list" hidden>${items}</div>
      </div>`;
    }

    div.innerHTML = inner;

    // toggle refs
    const toggle = div.querySelector('.refs-toggle');
    if(toggle){
      toggle.addEventListener('click', () => {
        const list = div.querySelector('.refs-list');
        const open = toggle.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
        list.hidden = !open;
      });
    }

    // cite badges click
    div.querySelectorAll('.cite-badge[data-ref]').forEach(badge => {
      badge.addEventListener('click', () => openRefModal(refs, badge.dataset.ref));
    });

    // ref-item click
    div.querySelectorAll('.ref-item[data-ref]').forEach(item => {
      item.addEventListener('click', () => openRefModal(refs, item.dataset.ref));
    });

    messagesEl.appendChild(div);
    if(suggestedActions && suggestedActions.actions && suggestedActions.actions.length)
      setQuickReplies(suggestedActions.actions);
    else
      clearQuickReplies();
  } else {
    div.innerHTML = `<div class="msg-body">${escHtml(text)}</div>`;
    messagesEl.appendChild(div);
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

/* ── Typing indicator ── */
function showTyping(){
  const div = document.createElement("div");
  div.className = "msg bot"; div.id = "typing-indicator";
  div.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping(){ const t=document.getElementById("typing-indicator"); if(t) t.remove(); }

/* ── تفعيل/تعطيل الإدخال ── */
function setReady(ready){
  input.disabled  = !ready;
  sendBtn.disabled = !ready;
  input.placeholder = ready ? "اكتب رسالتك هنا..." : "جارٍ الاتصال...";
}

/* ── Polling ── */
async function pollActivities(){
  if(!dlUrl || !conversationId || !token) return;
  try {
    const url = `${dlUrl}v3/directline/conversations/${conversationId}/activities${watermark?"?watermark="+watermark:""}`;
    const res  = await fetch(url, {headers:{"Authorization":"Bearer "+token}});
    if(!res.ok) return;
    const data = await res.json();
    if(data.activities && data.activities.length){
      data.activities.forEach(act => {
        if(act.id && seenActivityIds.has(act.id)) return;
        if(act.id) seenActivityIds.add(act.id);
        if(act.type==="message" && act.from && act.from.role==="bot"){
          const text = act.text || "";
          if(text){ hideTyping(); addMessage("bot", text, act.suggestedActions); waiting = false; }
        }
      });
      watermark = data.watermark;
    }
  } catch(e){}
}

/* ── إرسال Activity ── */
async function postActivity(activity){
  await fetch(`${dlUrl}v3/directline/conversations/${conversationId}/activities`, {
    method:"POST",
    headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
    body: JSON.stringify({...activity, from:{id:"user1",name:"User"}, locale:"ar-SA"})
  });
}

async function sendText(text){
  if(!text || waiting) return;
  waiting = true;
  clearQuickReplies();
  addMessage("user", text);
  showTyping();
  await postActivity({type:"message", text});
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;
  input.value = "";
  autoResize();
  updateInputDirection();
  await sendText(text);
}

/* ── تهيئة ── */
async function initChat(){
  try {
    const url = new URL(TOKEN_ENDPOINT);
    const apiVersion  = url.searchParams.get("api-version");
    const envEndpoint = url.origin;
    const settingsRes = await fetch(`${envEndpoint}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`);
    const settings    = await settingsRes.json();
    dlUrl = settings.channelUrlsById.directline;
    const convRes  = await fetch(TOKEN_ENDPOINT);
    const convInfo = await convRes.json();
    token = convInfo.token;
    const startRes  = await fetch(`${dlUrl}v3/directline/conversations`, {
      method:"POST", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}
    });
    const startData = await startRes.json();
    conversationId  = startData.conversationId;
    setInterval(pollActivities, 1500);
    setReady(true);
    await postActivity({type:"event", name:"startConversation", channelData:{postBack:true}});
    showTyping();
  } catch(err){
    console.error("فشل الاتصال:", err);
    input.placeholder = "فشل الاتصال — حاول تحديث الصفحة";
  }
}

sendBtn.addEventListener("click", sendMessage);
input.addEventListener("keydown", e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
initChat();
})();
</script>
</body>
</html>
